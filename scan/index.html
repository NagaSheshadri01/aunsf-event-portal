<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate Admission Scanner Console</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b1329; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    .animate-slide-down { animation: slideDown 0.25s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center p-3 sm:p-4 antialiased selection:bg-blue-500/20">

  <div class="w-full max-w-md bg-slate-900/40 border border-slate-800/80 rounded-3xl p-5 sm:p-6 backdrop-blur-md space-y-5 relative shadow-2xl">
    
    <div class="text-center space-y-1 select-none">
      <h1 class="text-xl font-black tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">Gate Admission Scanner</h1>
      <p class="text-slate-500 text-[11px] font-bold uppercase tracking-wider">Authorized Entry Gate Crew Verification Module</p>
    </div>

    <div class="relative bg-slate-950/80 border border-slate-800 rounded-2xl overflow-hidden aspect-square flex items-center justify-center shadow-inner">
      
      <div id="cameraLensPlaceholderBox" class="text-center space-y-2 p-6 select-none transition-all duration-300">
        <div class="w-12 h-12 bg-slate-900 border border-slate-800 rounded-full flex items-center justify-center mx-auto text-lg">📷</div>
        <p class="text-xs font-semibold text-slate-500 max-w-[200px] mx-auto leading-relaxed">Camera Lens Offline. Press the button below to initialize system scan hardware.</p>
      </div>

      <div id="readerSurfaceBoundary" class="hidden w-full h-full object-cover"></div>
    </div>

    <button id="startScannerBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm py-4 px-6 rounded-xl shadow-lg transition tracking-wide cursor-pointer flex items-center justify-center gap-2 group">
      📷 Start QR Scanner
    </button>

    <div class="bg-slate-950/40 border border-slate-800 p-4 rounded-xl space-y-2">
      <label for="manualRegIdInput" class="block text-[10px] font-black text-slate-500 uppercase tracking-wider">Manual Ticket ID Entry Code</label>
      <div class="flex gap-2">
        <input type="text" id="manualRegIdInput" placeholder="e.g., AUNSF-2026-001" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-xs text-slate-300 placeholder:text-slate-700 outline-none focus:border-slate-700 font-mono tracking-wider uppercase" />
        <button id="manualCheckInBtn" class="bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold text-xs px-4 py-2 rounded-xl transition cursor-pointer shrink-0">Verify</button>
      </div>
    </div>

    <div class="space-y-2.5">
      <h3 class="text-[10px] font-black uppercase text-slate-500 tracking-wider select-none px-0.5">Session Scan History Logs</h3>
      <div id="sessionScanHistoryLogsContainer" class="bg-slate-950/20 border border-slate-800 rounded-xl p-3 max-h-[140px] overflow-y-auto divide-y divide-slate-900/60 shadow-inner">
        </div>
    </div>

    <div id="statusVerificationOverlay" class="hidden absolute inset-0 z-50 bg-slate-950/95 rounded-3xl p-5 sm:p-6 flex flex-0 items-center justify-center backdrop-blur-sm animate-fade-in">
      
      <div id="loaderProcessingBanner" class="text-center space-y-3 select-none">
        <div class="w-10 h-10 border-4 border-blue-600/20 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
        <div class="text-xs font-black uppercase tracking-widest text-blue-400 animate-pulse">Verifying Ticket Pass...</div>
      </div>

      <div id="scannerFeedbackDeck" class="hidden w-full">
        <div id="feedbackContentContainer"></div>
      </div>

    </div>

  </div>

  <script src="scan.js"></script>
</body>
</html>
