<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUNSF Admission Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center p-4 pt-10">

  <div class="max-w-md w-full bg-slate-800 rounded-2xl border border-slate-700 p-6 shadow-2xl text-center space-y-6">
    <div>
      <h1 class="text-xl font-bold tracking-tight">Gate Admission Scanner</h1>
      <p class="text-slate-400 text-xs mt-1">Authorized Crew Verification Module</p>
    </div>

    <div class="overflow-hidden rounded-xl bg-slate-950 border border-slate-700 relative aspect-square flex items-center justify-center">
      <div id="reader" class="w-full h-full hidden"></div>
      <div id="scannerPlaceholder" class="text-slate-500 p-4 text-sm font-medium">Camera offline. Click the action button below to engage.</div>
    </div>

    <button id="scanTriggerBtn" class="w-full bg-blue-600 hover:bg-blue-500 font-bold py-3 px-4 rounded-xl shadow transition tracking-wide cursor-pointer flex items-center justify-center gap-2">
      📷 Engage Lens Scanner
    </button>

    <div id="resultBox" class="p-4 rounded-xl text-sm font-semibold transition hidden">
      <p id="resultMessage"></p>
    </div>

    <div class="bg-slate-950/50 rounded-xl p-4 border border-slate-700/60 text-left space-y-3">
      <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Device Scan Log History</h3>
      <div class="max-h-40 overflow-y-auto overflow-x-hidden text-xs font-mono space-y-2 divide-y divide-slate-800/60" id="logHistoryContainer">
        <p class="text-slate-600 italic py-2">No scans executed in current active browser window session context.</p>
      </div>
    </div>
  </div>

  <script src="scan.js"></script>
</body>
</html>
